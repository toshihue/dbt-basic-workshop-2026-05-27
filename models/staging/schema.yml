version: 2

sources:
  - name: jaffle_shop
    description: Raw application tables loaded into the raw database.
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: Raw customer records from the application.
        columns:
          - name: id
            description: Primary key for a customer in the raw source.
            data_tests:
              - unique
              - not_null
      - name: orders
        description: Raw order records from the application.
        columns:
          - name: id
            description: Primary key for an order in the raw source.
            data_tests:
              - unique
              - not_null

models:
  - name: stg_customers
    description: Standardized customer records from the raw customers source.
    columns:
      - name: customer_id
        description: Primary key for the customer.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: Customer first name.
      - name: last_name
        description: Customer last name.

  - name: stg_orders
    description: Standardized order records from the raw orders source.
    columns:
      - name: order_id
        description: Primary key for the order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: order_date
        description: Date the order was placed.
      - name: status
        description: Current order status from the application.
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']
