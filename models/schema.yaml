version: 2

models:
  - name: customers
    description: 1レコードが1件の顧客を示す
    columns:
      - name: customer_id
        description: 顧客IDを示す主キー
        tests:
          - unique
          - not_null
      - name: first_name
        description: 顧客の名
        tests:
          - not_null
      - name: last_name
        description: 顧客の姓
        tests:
          - not_null
      - name: first_order_date
        description: 初回の注文日。NULLは顧客がまだ注文したことがないことを示す
      - name: most_recent_order_date
        description: 最新の注文日。NULLは顧客がまだ注文したことがないことを示す
      - name: number_of_orders
        description: 顧客の累計注文件数。注文がない場合はNULL

  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: status
        data_tests:
          - accepted_values:
              arguments: # available in v1.10.5 and higher. Older versions can set the <argument_name> as the top-level property.
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

unit_tests:
  - name: test_customers_aggregates_orders_for_existing_customer
    model: customers
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 1, first_name: "John", last_name: "Doe"}
      - input: ref('stg_orders')
        rows:
          - {order_id: 1, customer_id: 1, order_date: "2023-01-01"}
          - {order_id: 2, customer_id: 1, order_date: "2023-06-15"}
    expect:
      rows:
        - {
            customer_id: 1,
            first_name: "John",
            last_name: "Doe",
            first_order_date: "2023-01-01",
            most_recent_order_date: "2023-06-15",
            number_of_orders: 2
          }


  - name: test_customers_defaults_to_zero_orders_when_no_orders_exist
    model: customers
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 1, first_name: "Jane", last_name: "Smith"}
      - input: ref('stg_orders')
        rows: []
    expect:
      rows:
        - {
            customer_id: 1,
            first_name: "Jane",
            last_name: "Smith",
            first_order_date: null,
            most_recent_order_date: null,
            number_of_orders: 0
          }
