version: 2

models:
  - name: customers
    description: 1レコードが1件の顧客を示す
    columns:
      - name: customer_id
        description: 顧客IDを示す主キー
        tests:
          - unique
          - not_null
      - name: first_name
        description: 顧客の名
        tests:
          - not_null
      - name: last_name
        description: 顧客の姓
        tests:
          - not_null
      - name: first_order_date
        description: 初回の注文日。NULLは顧客がまだ注文したことがないことを示す
      - name: most_recent_order_date
        description: 最新の注文日。NULLは顧客がまだ注文したことがないことを示す
      - name: number_of_orders
        description: 顧客の累計注文件数。注文がない場合はNULL

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              arguments: # available in v1.10.5 and higher. Older versions can set the <argument_name> as the top-level property.
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
