version: 2

models:
  - name: stg_customers
    description: 顧客 source を staging 用に整形したモデル。
    columns:
      - name: customer_id
        description: 顧客ID。
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: 顧客の名。
      - name: last_name
        description: 顧客の姓。

  - name: stg_orders
    description: 注文 source を staging 用に整形したモデル。
    columns:
      - name: order_id
        description: 注文ID。
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: 注文した顧客のID。
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: order_date
        description: 注文日。
      - name: status
        description: 注文ステータス。
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']

  - name: customers
    description: 1レコードが1顧客を表す顧客集計モデル。
    columns:
      - name: customer_id
        description: 顧客IDを示す主キー。
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: 顧客の名。
        data_tests:
          - not_null
      - name: last_name
        description: 顧客の姓。
        data_tests:
          - not_null
      - name: first_order_date
        description: 顧客の初回注文日。注文がない場合は null。
      - name: most_recent_order_date
        description: 顧客の最新注文日。注文がない場合は null。
      - name: number_of_orders
        description: 顧客の累計注文件数。注文がない場合は 0。

unit_tests:
  - name: test_customers_aggregates_orders_for_existing_customer
    model: customers
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 1, first_name: "John", last_name: "Doe"}
      - input: ref('stg_orders')
        rows:
          - {order_id: 1, customer_id: 1, order_date: "2023-01-01"}
          - {order_id: 2, customer_id: 1, order_date: "2023-06-15"}
    expect:
      rows:
        - {customer_id: 1, first_name: "John", last_name: "Doe", first_order_date: "2023-01-01", most_recent_order_date: "2023-06-15", number_of_orders: 2}

  - name: test_customers_defaults_to_zero_orders_when_no_orders_exist
    model: customers
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 1, first_name: "Jane", last_name: "Smith"}
      - input: ref('stg_orders')
        rows: []
    expect:
      rows:
        - {customer_id: 1, first_name: "Jane", last_name: "Smith", first_order_date: null, most_recent_order_date: null, number_of_orders: 0}
