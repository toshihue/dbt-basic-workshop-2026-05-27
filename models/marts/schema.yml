version: 2

models:
  - name: customers
    description: One row per customer with first order date, most recent order date, and total number of orders.
    columns:
      - name: customer_id
        description: Primary key for the customer.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: Customer first name.
      - name: last_name
        description: Customer last name.
      - name: first_order_date
        description: Date of the customer's first order. Null when the customer has never placed an order.
      - name: most_recent_order_date
        description: Date of the customer's most recent order. Null when the customer has never placed an order.
      - name: number_of_orders
        description: Total number of orders placed by the customer. Defaults to 0 when the customer has no orders.

unit_tests:
  - name: test_customers_aggregates_orders_for_existing_customer
    model: customers
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 1, first_name: "John", last_name: "Doe"}
      - input: ref('stg_orders')
        rows:
          - {order_id: 1, customer_id: 1, order_date: "2023-01-01", status: "placed"}
          - {order_id: 2, customer_id: 1, order_date: "2023-06-15", status: "completed"}
    expect:
      rows:
        - {
            customer_id: 1,
            first_name: "John",
            last_name: "Doe",
            first_order_date: "2023-01-01",
            most_recent_order_date: "2023-06-15",
            number_of_orders: 2
          }

  - name: test_customers_defaults_to_zero_orders_when_no_orders_exist
    model: customers
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 1, first_name: "Jane", last_name: "Smith"}
      - input: ref('stg_orders')
        rows: []
    expect:
      rows:
        - {
            customer_id: 1,
            first_name: "Jane",
            last_name: "Smith",
            first_order_date: null,
            most_recent_order_date: null,
            number_of_orders: 0
          }
